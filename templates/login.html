<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Sealed - Connexion</title>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">
    <div class="bg-gray-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-gray-700">
        <h2 class="text-3xl font-extrabold mb-2 text-green-500 text-center">SEALED</h2>
        <p class="text-gray-400 text-center mb-8">Accédez à vos actifs</p>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="mb-4 p-3 rounded-lg text-sm font-medium text-center {% if category == 'danger' %}bg-red-500/20 text-red-400 border border-red-500/50{% else %}bg-blue-500/20 text-blue-400 border border-blue-500/50{% endif %}">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" class="space-y-4">
            <input type="text" name="username" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:border-green-500 focus:outline-none transition" placeholder="Nom d'utilisateur" required>
            <input type="password" name="password" class="w-full p-3 rounded-lg bg-gray-700 border border-gray-600 focus:border-green-500 focus:outline-none transition" placeholder="Mot de passe" required>
            <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg shadow-lg transform active:scale-95 transition">
                Se connecter
            </button>
        </form>

        <p class="mt-6 text-center text-gray-500 text-sm">
            Nouveau ici ? <a href="/register" class="text-green-400 hover:underline">Créer un portefeuille</a>
        </p>
    </div>
</body>
</html>
