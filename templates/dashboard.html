<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DOLLAR MAP | Global Domination</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root {
            --bg-dark: #05070a;
            --accent: #3b82f6;
            --glass: rgba(13, 17, 23, 0.7);
        }

        body, html { 
            margin: 0; padding: 0; height: 100%; 
            background: var(--bg-dark); 
            font-family: 'Inter', sans-serif;
            color: white;
            overflow: hidden;
        }

        #map { 
            position: absolute; top: 0; bottom: 0; left: 0; right: 0;
            background: var(--bg-dark) !important;
            z-index: 1;
        }

        /* Glassmorphism Classes */
        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        .btn-primary {
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.5);
        }

        /* Smooth UI Transitions */
        .panel-transition {
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* Custom Map Style Fixes */
        .leaflet-tile-pane { filter: brightness(0.6) contrast(1.2) grayscale(0.2); }
        .leaflet-container { background: var(--bg-dark) !important; }
        .leaflet-control-zoom { display: none !important; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="absolute top-8 left-8 z-[1000]">
        <div class="glass px-6 py-4 rounded-2xl">
            <h1 class="text-2xl font-black italic tracking-tighter flex items-center gap-2">
                <span class="text-blue-500">THE</span> DOLLAR MAP
            </h1>
            <div class="h-1 w-full bg-blue-500/20 mt-1 rounded-full overflow-hidden">
                <div class="h-full bg-blue-500 animate-pulse" style="width: 40%"></div>
            </div>
        </div>
    </div>

    <div class="absolute top-8 right-8 z-[1000] w-80 space-y-4">
        <div class="glass p-6 rounded-3xl flex justify-between items-center group">
            <div>
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Available Funds</p>
                <p id="user-balance" class="text-2xl font-black font-mono text-white">0.00 <span class="text-blue-500">$</span></p>
            </div>
            <div class="w-12 h-12 rounded-2xl bg-blue-500/10 flex items-center justify-center text-blue-500 group-hover:bg-blue-500 group-hover:text-white transition-all cursor-pointer">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path d="M12 4v16m8-8H4"/></svg>
            </div>
        </div>

        <div class="glass rounded-3xl overflow-hidden">
            <div class="p-6 border-b border-white/5">
                <h2 class="text-xs font-black uppercase tracking-widest text-slate-400">Global Leaderboard</h2>
            </div>
            <div id="scoreboard" class="max-h-[50vh] overflow-y-auto p-2 space-y-1">
                </div>
        </div>
    </div>

    <div id="buy-panel" class="absolute bottom-12 left-1/2 -translate-x-1/2 z-[1000] w-[500px] glass rounded-[2.5rem] p-10 panel-transition opacity-0 translate-y-20 pointer-events-none">
        <div class="flex justify-between items-center mb-8">
            <div>
                <span class="text-blue-500 font-bold tracking-[0.3em] text-[10px] uppercase">Target Country</span>
                <h2 id="country-name" class="text-4xl font-black italic uppercase tracking-tighter">N/A</h2>
            </div>
            <button onclick="closePanel()" class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center hover:bg-white/10 transition-all">✕</button>
        </div>

        <div class="grid grid-cols-2 gap-6 mb-8">
            <div class="space-y-1">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Current Value</p>
                <div class="text-2xl font-mono font-bold" id="country-price">1.00 $</div>
            </div>
            <div class="space-y-1">
                <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">Your Bid ($)</p>
                <input type="number" id="custom-price" class="w-full bg-transparent text-2xl font-mono font-bold border-b-2 border-blue-500/30 focus:border-blue-500 outline-none pb-1 transition-all">
            </div>
        </div>

        <div class="space-y-6">
            <div class="space-y-2">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest ml-1">Propaganda Image URL</p>
                <input type="text" id="image-url" placeholder="https://image-link.com/..." class="w-full bg-white/5 border border-white/10 rounded-2xl px-5 py-4 text-sm focus:bg-white/10 outline-none transition-all">
            </div>
            <button onclick="processPurchase()" class="btn-primary w-full py-5 rounded-2xl font-black text-sm uppercase tracking-[0.2em]">
                Confirm Occupation
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Init Map with single world view
        const map = L.map('map', {
            zoomControl: false,
            minZoom: 2.4,
            maxZoom: 5,
            worldCopyJump: false,
            maxBounds: [[-85, -180], [85, 180]],
            maxBoundsViscosity: 1.0
        }).setView([20, 0], 2.5);

        let countriesDB = {};
        let selectedISO = null;

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', {
            noWrap: true
        }).addTo(map);

        // Pattern system with better scaling
        function createPattern(id, url) {
            let svg = document.querySelector('svg');
            if(!svg) return;
            let defs = svg.querySelector('defs') || svg.insertBefore(document.createElementNS("http://www.w3.org/2000/svg", "defs"), svg.firstChild);
            
            let pattern = document.getElementById('pat-'+id);
            if(!pattern) {
                pattern = document.createElementNS("http://www.w3.org/2000/svg", "pattern");
                pattern.setAttribute('id', 'pat-'+id);
                pattern.setAttribute('patternUnits', 'userSpaceOnUse');
                pattern.setAttribute('width', '250');
                pattern.setAttribute('height', '250');
                const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
                img.setAttribute('width', '250');
                img.setAttribute('height', '250');
                img.setAttribute('preserveAspectRatio', 'xMidYMid slice');
                pattern.appendChild(img);
                defs.appendChild(pattern);
            }
            pattern.querySelector('image').setAttribute('href', url);
        }

        async function init() {
            const [geoRes, dbRes] = await Promise.all([
                fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson'),
                fetch('/api/countries')
            ]);
            const geoData = await geoRes.json();
            countriesDB = await dbRes.json();

            L.geoJSON(geoData, {
                style: (f) => {
                    const iso = f.properties.iso_a3;
                    if(countriesDB[iso] && countriesDB[iso].image_url) {
                        createPattern(iso, countriesDB[iso].image_url);
                        return { fillOpacity: 1, fillColor: `url(#pat-${iso})`, color: '#3b82f6', weight: 0.8 };
                    }
                    return { fillOpacity: 1, fillColor: '#0f172a', color: '#1e293b', weight: 0.8 };
                },
                onEachFeature: (f, layer) => {
                    layer.on('mouseover', () => layer.setStyle({ weight: 2, color: '#3b82f6' }));
                    layer.on('mouseout', () => layer.setStyle({ weight: 0.8, color: countriesDB[f.properties.iso_a3] ? '#3b82f6' : '#1e293b' }));
                    layer.on('click', (e) => openPanel(f.properties));
                }
            }).addTo(map);

            renderScoreboard();
        }

        function openPanel(props) {
            selectedISO = props.iso_a3;
            const data = countriesDB[selectedISO] || {price: 1.0};
            document.getElementById('country-name').innerText = props.name;
            document.getElementById('country-price').innerText = data.price.toFixed(2) + " $";
            document.getElementById('custom-price').value = (data.price * 1.2).toFixed(2);
            
            const panel = document.getElementById('buy-panel');
            panel.classList.remove('opacity-0', 'translate-y-20', 'pointer-events-none');
        }

        function closePanel() {
            const panel = document.getElementById('buy-panel');
            panel.classList.add('opacity-0', 'translate-y-20', 'pointer-events-none');
        }

        function renderScoreboard() {
            const container = document.getElementById('scoreboard');
            const sorted = Object.entries(countriesDB).sort((a,b) => b[1].price - a[1].price).slice(0, 8);
            
            container.innerHTML = sorted.map(([iso, data]) => `
                <div class="flex items-center justify-between p-4 hover:bg-white/5 rounded-2xl transition-all cursor-default group">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-cover bg-center border border-white/10" style="background-image: url('${data.image_url}')"></div>
                        <span class="font-black text-xs tracking-tighter uppercase text-slate-300">${iso}</span>
                    </div>
                    <span class="font-mono text-blue-500 font-bold">$${data.price.toFixed(0)}</span>
                </div>
            `).join('') || '<div class="p-8 text-center text-slate-600 text-xs uppercase font-bold tracking-widest">No Occupations Yet</div>';
        }

        async function processPurchase() {
            const bid = document.getElementById('custom-price').value;
            const img = document.getElementById('image-url').value;
            
            const res = await fetch('/buy-country', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({code: selectedISO, price: bid, image_url: img})
            });
            const result = await res.json();
            if(result.success) location.reload();
            else alert(result.error);
        }

        init();
    </script>
</body>
</html>
