<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DOLLAR MAP</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <style>
        :root { --bg: #05070a; }
        body, html { margin: 0; height: 100%; background: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: white; overflow: hidden; }
        #map { position: absolute; inset: 0; background: var(--bg) !important; z-index: 1; }
        .glass { background: rgba(10, 15, 25, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .country-style { transition: all 0.2s ease; cursor: pointer; outline: none; }
        .leaflet-tile-pane { filter: brightness(0.2) contrast(1.2); }
        .leaflet-control-zoom { display: none !important; }
        .panel-slide { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="absolute top-8 left-8 z-[1000]">
        <div class="glass px-8 py-5 rounded-3xl">
            <h1 class="text-xl font-extrabold italic uppercase tracking-tighter">THE DOLLAR MAP<span class="text-blue-500">.COM</span></h1>
        </div>
    </div>

    <div id="buy-panel" class="absolute bottom-10 left-1/2 -translate-x-1/2 z-[1000] w-[450px] glass rounded-[2.5rem] p-10 opacity-0 translate-y-32 pointer-events-none panel-slide">
        <div class="flex justify-between items-start mb-8">
            <h2 id="country-name" class="text-4xl font-black italic uppercase">Country</h2>
            <button onclick="closePanel()" class="text-slate-500 hover:text-white">✕</button>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white/5 p-5 rounded-2xl">
                <p class="text-[9px] font-bold text-slate-500 uppercase mb-1">Current Price</p>
                <div id="country-price" class="text-xl font-bold">1.00 $</div>
            </div>
            <div class="bg-blue-500/10 p-5 rounded-2xl border border-blue-500/20">
                <p class="text-[9px] font-bold text-blue-500 uppercase mb-1">Your Bid ($)</p>
                <input type="number" id="custom-price" step="0.01" class="w-full bg-transparent text-xl font-bold outline-none text-white">
            </div>
        </div>
        <button id="pay-button" onclick="initiatePayment()" class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-2xl font-black uppercase text-xs tracking-widest transition-all">PAY & CONQUER</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Ta clé publique fournie
        const stripe = Stripe('pk_test_51TVjwdGsTyjMzFLCrl6ZBH80WEz53136nqOUrXUOYiJV2C0vLsQrkrzOgY1edwVnaH7DAUvemMWFnrFMc9ZRWRr200AfgGOSgy'); 

        const map = L.map('map', { zoomControl: false, minZoom: 2.3, maxZoom: 5, worldCopyJump: false, maxBounds: [[-85, -180], [85, 180]], maxBoundsViscosity: 1.0 }).setView([20, 0], 2.4);
        let countriesDB = {};
        let geoLayer;
        let selectedISO = null;

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', { noWrap: true }).addTo(map);

        async function load() {
            try {
                const [g, d] = await Promise.all([
                    fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson').then(r => r.json()),
                    fetch('/api/countries').then(r => r.json())
                ]);
                countriesDB = d;
                
                geoLayer = L.geoJSON(g, {
                    style: (f) => {
                        const iso = f.properties.iso_a3;
                        const isConquered = countriesDB[iso];
                        return { 
                            fillOpacity: 1, 
                            fillColor: isConquered ? '#3b82f6' : '#161b22', 
                            color: isConquered ? '#60a5fa' : '#2d333b', 
                            weight: 1, 
                            className: 'country-style' 
                        };
                    },
                    onEachFeature: (f, layer) => {
                        layer.on({
                            mouseover: (e) => { e.target.setStyle({ weight: 2, color: '#ffffff' }); },
                            mouseout: (e) => { geoLayer.resetStyle(e.target); },
                            click: (e) => {
                                selectedISO = f.properties.iso_a3;
                                const data = countriesDB[selectedISO];
                                document.getElementById('country-name').innerText = f.properties.name;
                                let minVal = data ? Math.max(1.00, data.price * 1.2).toFixed(2) : "1.00";
                                document.getElementById('country-price').innerText = data ? data.price.toFixed(2) + " $" : "FREE";
                                document.getElementById('custom-price').value = minVal;
                                document.getElementById('buy-panel').classList.remove('opacity-0', 'translate-y-32', 'pointer-events-none');
                                L.DomEvent.stopPropagation(e);
                            }
                        });
                    }
                }).addTo(map);
            } catch(e) { console.error("Load error:", e); }
        }

        async function initiatePayment() {
            const btn = document.getElementById('pay-button');
            const price = document.getElementById('custom-price').value;
            
            btn.innerText = "OPENING SECURE PORTAL...";
            btn.disabled = true;

            try {
                const response = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ code: selectedISO, price: price })
                });
                
                const session = await response.json();

                if (session.id) {
                    // Redirection vers Stripe
                    const result = await stripe.redirectToCheckout({ sessionId: session.id });
                    if (result.error) alert(result.error.message);
                } else {
                    alert("Server Error: " + (session.error || "Could not create session"));
                }
            } catch (err) {
                console.error(err);
                alert("Network error. Please try again.");
            } finally {
                btn.innerText = "PAY & CONQUER";
                btn.disabled = false;
            }
        }

        function closePanel() { document.getElementById('buy-panel').classList.add('opacity-0', 'translate-y-32', 'pointer-events-none'); }
        map.on('click', closePanel);
        load();
    </script>
</body>
</html>
