<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DOLLAR MAP | Command Center</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --bg: #05070a; --ui-panel: rgba(10, 12, 16, 0.95); }
        body, html { margin: 0; height: 100%; background: var(--bg); font-family: 'JetBrains Mono', monospace; color: white; overflow: hidden; }
        #map { position: absolute; inset: 0; background: var(--bg) !important; z-index: 1; }
        
        /* Filtre Carte Cyber */
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(0.1) contrast(1.8); }
        
        .glass-panel { background: var(--ui-panel); border: 1px solid rgba(0, 242, 255, 0.15); backdrop-filter: blur(10px); }
        .neon-border { border: 1px solid var(--neon); box-shadow: 0 0 15px rgba(0, 242, 255, 0.3); }
        .neon-text { color: var(--neon); text-shadow: 0 0 8px rgba(0, 242, 255, 0.5); }
        
        /* Animation du pays sélectionné */
        .selected-country { fill-color: #00f2ff !important; fill-opacity: 0.5 !important; stroke: #fff !important; stroke-width: 3px !important; }
        
        .btn-action { background: var(--neon); color: black; font-weight: 800; transition: 0.3s; text-transform: uppercase; }
        .btn-action:hover:not(:disabled) { box-shadow: 0 0 20px var(--neon); transform: translateY(-2px); }

        .dropdown-menu { display: none; position: absolute; right: 0; top: 100%; width: 200px; z-index: 2000; }
        .show { display: block; }
    </style>
</head>
<body>

    <div id="map"></div>

    <nav class="absolute top-0 left-0 right-0 z-[1000] p-6 flex justify-between items-center pointer-events-none">
        <div class="w-1/3"></div>
        
        <div class="w-1/3 flex justify-center pointer-events-auto">
            <div class="glass-panel px-8 py-3 rounded-full border-b-2 border-cyan-400">
                <h1 class="text-xl font-black tracking-[0.2em] italic uppercase">The Dollar Map</h1>
            </div>
        </div>

        <div class="w-1/3 flex justify-end gap-4 pointer-events-auto">
            <div id="auth-logged-out">
                <button onclick="showAuthModal()" class="glass-panel text-[10px] px-6 py-2 hover:bg-cyan-400/10 transition-all uppercase tracking-widest">Connect Identity</button>
            </div>
            <div id="auth-logged-in" class="hidden relative">
                <button onclick="toggleSettings()" class="glass-panel px-4 py-2 flex items-center gap-3 hover:border-cyan-400 transition-all">
                    <span id="user-display" class="text-xs font-bold neon-text">---</span>
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15l5-5H7l5 5z"/></svg>
                </button>
                
                <div id="settings-menu" class="dropdown-menu glass-panel mt-2 p-2 rounded-lg border border-cyan-400/30">
                    <button onclick="openChangeUsername()" class="w-full text-left p-3 text-[10px] hover:bg-cyan-400/10 uppercase tracking-tighter border-b border-white/5">Change Username</button>
                    <button onclick="logout()" class="w-full text-left p-3 text-[10px] hover:bg-red-500/10 text-red-400 uppercase tracking-tighter">Disconnect</button>
                </div>
            </div>
        </div>
    </nav>

    <aside class="absolute top-24 left-8 z-[1000] w-64 h-[70vh] flex flex-col pointer-events-auto">
        <div class="glass-panel p-5 rounded-sm flex-1 overflow-hidden flex flex-col border-l-4 border-cyan-400">
            <div class="flex items-center justify-between mb-6 border-b border-white/10 pb-2">
                <h2 class="text-[9px] font-bold uppercase tracking-widest text-cyan-400">Global Ranking</h2>
            </div>
            <div id="scoreboard" class="space-y-4 overflow-y-auto pr-2 text-[10px]">
                </div>
        </div>
    </aside>

    <div id="buy-panel" class="absolute bottom-10 right-10 z-[1000] w-96 glass-panel p-8 translate-x-[120%] transition-all duration-500">
        <div class="mb-6">
            <span class="text-[8px] text-cyan-400 uppercase tracking-widest">Target Sector</span>
            <h2 id="country-name" class="text-2xl font-black uppercase italic italic">---</h2>
        </div>
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="p-3 bg-white/5 border-l border-white/20">
                <p class="text-[7px] text-slate-500 uppercase">Valuation</p>
                <div id="country-price" class="text-md font-bold">$1.00</div>
            </div>
            <div class="p-3 bg-cyan-400/5 border-l border-cyan-400">
                <p class="text-[7px] text-cyan-400 uppercase">Your Bid</p>
                <input type="number" id="custom-price" class="w-full bg-transparent text-md font-bold outline-none" step="0.01">
            </div>
        </div>
        <button id="pay-button" onclick="initiatePayment()" class="w-full btn-action py-4 text-[10px] tracking-widest">Initialise Conquest</button>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 z-[3000] bg-black/95 flex items-center justify-center p-4">
        <div class="w-full max-w-sm glass-panel p-10 neon-border">
            <h3 id="auth-title" class="text-xl font-black uppercase text-center mb-8 italic">Authentication</h3>
            <div class="space-y-4">
                <div id="username-field" class="hidden space-y-1">
                    <label class="text-[8px] text-cyan-400 uppercase ml-1">Commander Name</label>
                    <input type="text" id="auth-user" class="w-full bg-white/5 border border-white/10 p-3 text-xs outline-none focus:border-cyan-400">
                </div>
                <div class="space-y-1">
                    <label class="text-[8px] text-cyan-400 uppercase ml-1">Email</label>
                    <input type="email" id="auth-email" class="w-full bg-white/5 border border-white/10 p-3 text-xs outline-none focus:border-cyan-400">
                </div>
                <div class="space-y-1">
                    <label class="text-[8px] text-cyan-400 uppercase ml-1">Password</label>
                    <input type="password" id="auth-pass" class="w-full bg-white/5 border border-white/10 p-3 text-xs outline-none focus:border-cyan-400">
                </div>
            </div>
            <div id="login-actions" class="mt-8 space-y-3">
                <button onclick="handleAuth('login')" class="w-full btn-action py-3 text-[10px]">Log In</button>
                <button onclick="toggleAuthMode(true)" class="w-full text-[8px] text-slate-500 uppercase tracking-widest py-2">No identity? Create one</button>
            </div>
            <div id="signup-actions" class="hidden mt-8 space-y-3">
                <button onclick="handleAuth('signup')" class="w-full btn-action py-3 text-[10px] bg-orange-500">Register Identity</button>
                <button onclick="toggleAuthMode(false)" class="w-full text-[8px] text-slate-500 uppercase tracking-widest py-2">Back to Login</button>
            </div>
            <button onclick="hideAuthModal()" class="w-full mt-4 text-[8px] text-slate-600 uppercase hover:text-white transition-colors">Cancel</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // CONFIG FIREBASE (REMPLACE PAR TES INFOS)
        const firebaseConfig = {
            apiKey: "AIzaSyCGbqxVZBers7XbTUM94A3GM5pkBYYt3_0",
            authDomain: "sealed-2bd55.firebaseapp.com",
            projectId: "sealed-2bd55",
            storageBucket: "sealed-2bd55.firebasestorage.app",
            messagingSenderId: "677524832121",
            appId: "1:677524832121:web:3c8c29084fad7ab3b4b9a8"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const stripe = Stripe('pk_test_51TVjwdGsTyjMzFLCrl6ZBH80WEz53136nqOUrXUOYiJV2C0vLsQrkrzOgY1edwVnaH7DAUvemMWFnrFMc9ZRWRr200AfgGOSgy');

        const map = L.map('map', { zoomControl: false, minZoom: 2.3 }).setView([20, 0], 2.5);
        let countriesDB = {};
        let currentUser = null;
        let selectedLayer = null;
        let geoLayer;

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        // --- AUTH & SETTINGS ---
        auth.onAuthStateChanged(user => {
            currentUser = user;
            const outBox = document.getElementById('auth-logged-out');
            const inBox = document.getElementById('auth-logged-in');
            if (user) {
                outBox.classList.add('hidden');
                inBox.classList.remove('hidden');
                document.getElementById('user-display').innerText = (user.displayName || user.email.split('@')[0]).toUpperCase();
                hideAuthModal();
            } else {
                outBox.classList.remove('hidden');
                inBox.classList.add('hidden');
            }
        });

        function toggleAuthMode(isSignup) {
            document.getElementById('username-field').classList.toggle('hidden', !isSignup);
            document.getElementById('login-actions').classList.toggle('hidden', isSignup);
            document.getElementById('signup-actions').classList.toggle('hidden', !isSignup);
            document.getElementById('auth-title').innerText = isSignup ? "Create Identity" : "Authentication";
        }

        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            const username = document.getElementById('auth-user').value;

            try {
                if (type === 'signup') {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await res.user.updateProfile({ displayName: username });
                    window.location.reload();
                } else {
                    await auth.signInWithEmailAndPassword(email, pass);
                }
            } catch(e) { alert(e.message); }
        }

        function toggleSettings() { document.getElementById('settings-menu').classList.toggle('show'); }
        async function openChangeUsername() {
            const newName = prompt("Enter new Commander Name:");
            if (newName && currentUser) {
                await currentUser.updateProfile({ displayName: newName });
                window.location.reload();
            }
        }
        function logout() { auth.signOut(); }
        function showAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function hideAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }

        // --- MAP LOGIC ---
        async function load() {
            const [g, d] = await Promise.all([
                fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson').then(r => r.json()),
                fetch('/api/countries').then(r => r.json())
            ]);
            countriesDB = d;
            
            if(geoLayer) map.removeLayer(geoLayer);
            geoLayer = L.geoJSON(g, {
                style: (f) => {
                    const iso = f.properties.iso_a3;
                    const data = countriesDB[iso];
                    return {
                        fillOpacity: 0.8,
                        fillColor: data ? '#00f2ff' : '#0a0c10',
                        color: data ? '#00f2ff' : '#1a1d23',
                        weight: 0.5
                    };
                },
                onEachFeature: (f, layer) => {
                    layer.on('click', (e) => {
                        // SURBRILLANCE PERSISTANTE
                        if(selectedLayer) geoLayer.resetStyle(selectedLayer);
                        selectedLayer = layer;
                        layer.setStyle({ color: '#fff', weight: 3, fillOpacity: 0.5 });
                        
                        // Panel Buy
                        const iso = f.properties.iso_a3;
                        const data = countriesDB[iso];
                        document.getElementById('country-name').innerText = f.properties.name;
                        let min = data ? (data.price * 1.2).toFixed(2) : "1.00";
                        document.getElementById('country-price').innerText = data ? `$${data.price.toFixed(2)}` : "FREE";
                        document.getElementById('custom-price').value = min;
                        document.getElementById('buy-panel').style.transform = "translateX(0)";
                        
                        selectedISO = iso;
                        L.DomEvent.stopPropagation(e);
                    });
                }
            }).addTo(map);
            renderLeaderboard();
        }

        function renderLeaderboard() {
            const sorted = Object.entries(countriesDB).sort((a,b) => b[1].price - a[1].price).slice(0, 20);
            document.getElementById('scoreboard').innerHTML = sorted.map(([iso, data]) => {
                // Mapping simplifié pour drapeaux (ISO3 -> ISO2 approximatif)
                const flagIso = iso.substring(0,2).toLowerCase();
                return `
                    <div class="flex items-center justify-between border-b border-white/5 pb-3">
                        <div class="flex items-center gap-3">
                            <img src="https://flagcdn.com/w20/${flagIso}.png" onerror="this.style.display='none'" class="w-4 h-3 object-cover rounded-[1px]">
                            <span class="font-bold">${iso}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-cyan-400 font-bold">$${data.price.toFixed(0)}</div>
                            <div class="text-[6px] text-slate-500 uppercase truncate max-w-[80px]">${data.owner_name || 'LEGACY'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function initiatePayment() {
            if(!currentUser) return showAuthModal();
            const btn = document.getElementById('pay-button');
            btn.innerText = "AUTHENTICATING..."; btn.disabled = true;

            const res = await fetch('/create-checkout-session', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ 
                    code: selectedISO, 
                    price: document.getElementById('custom-price').value,
                    user_id: currentUser.uid,
                    username: currentUser.displayName || currentUser.email.split('@')[0]
                })
            });
            const session = await res.json();
            if(session.id) stripe.redirectToCheckout({ sessionId: session.id });
            else { alert(session.error); btn.innerText = "Initialise Conquest"; btn.disabled = false; }
        }

        map.on('click', () => {
            if(selectedLayer) geoLayer.resetStyle(selectedLayer);
            document.getElementById('buy-panel').style.transform = "translateX(120%)";
            document.getElementById('settings-menu').classList.remove('show');
        });

        load();
        setInterval(load, 20000); // Sync auto
    </script>
</body>
</html>
