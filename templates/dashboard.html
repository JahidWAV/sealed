<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DOLLAR MAP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --bg: #05070a; }
        body, html { margin: 0; height: 100%; background: var(--bg); font-family: 'JetBrains Mono', monospace; color: white; overflow: hidden; }
        #map { position: absolute; inset: 0; background: var(--bg) !important; z-index: 1; }
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(0.15) contrast(1.5); }

        /* Superposition UI */
        .ui-overlay { position: absolute; inset: 0; z-index: 1000; pointer-events: none; }
        .ui-element { pointer-events: auto; }
        .glass-panel { background: rgba(10, 12, 16, 0.92); border: 1px solid rgba(0, 242, 255, 0.1); backdrop-filter: blur(12px); }
        
        /* Logo Style Original */
        .logo-box { border: 1px solid rgba(0, 242, 255, 0.3); background: rgba(5, 7, 10, 0.8); }

        /* Panel Central Animé */
        #contribution-panel {
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform: translate(-50%, 120%);
        }
        #contribution-panel.active { transform: translate(-50%, 0); }

        .neon-text { color: var(--neon); text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-overlay">
        
        <!-- LOGO CENTRÉ (Version Originale) -->
        <div class="absolute top-6 left-1/2 -translate-x-1/2 ui-element">
            <div class="logo-box px-10 py-3 flex items-center gap-4">
                <div class="h-6 w-1 bg-cyan-400 shadow-[0_0_10px_#00f2ff]"></div>
                <h1 class="text-xl font-black italic tracking-tighter uppercase">THE DOLLAR MAP</h1>
            </div>
        </div>

        <!-- LEADERBOARD GAUCHE -->
        <div class="absolute top-6 left-6 w-72 ui-element">
            <div class="glass-panel p-5 border-l-2 border-cyan-400 max-h-[85vh] flex flex-col">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-[9px] font-bold uppercase tracking-[0.3em] text-cyan-400">Global Ranking</h2>
                    <span class="w-2 h-2 rounded-full bg-cyan-400 animate-pulse"></span>
                </div>
                <div id="scoreboard" class="space-y-2 overflow-y-auto pr-1">
                    <!-- Nations Ranking -->
                </div>
            </div>
        </div>

        <!-- USER / AUTH DROITE -->
        <div class="absolute top-6 right-6 ui-element">
            <div id="auth-logged-in" class="hidden relative">
                <button onclick="toggleSettings()" class="glass-panel px-5 py-2 text-[10px] neon-text font-bold uppercase tracking-widest border border-cyan-400/20">
                    <span id="user-display">COMMANDER</span>
                </button>
                <div id="settings-menu" class="hidden absolute right-0 mt-2 w-48 glass-panel p-2 border border-cyan-400/30">
                    <button onclick="logout()" class="w-full text-left p-3 text-[9px] text-red-400 hover:bg-red-500/10 uppercase font-bold">Disconnect</button>
                </div>
            </div>
            <button id="auth-logged-out" onclick="showAuthModal()" class="glass-panel px-6 py-2 text-[10px] uppercase tracking-widest border border-white/10 hover:border-cyan-400 transition-all">Enlist Identity</button>
        </div>

        <!-- CENTRE DE CONTRIBUTION (BAS MILIEU) -->
        <div id="contribution-panel" class="absolute bottom-10 left-1/2 w-[500px] glass-panel p-10 ui-element border-t-2 border-cyan-400 shadow-[0_-10px_30px_rgba(0,0,0,0.5)]">
            <div class="flex justify-between items-start mb-8">
                <div>
                    <h2 id="country-name" class="text-3xl font-black italic uppercase tracking-tighter">---</h2>
                    <p class="text-[9px] text-cyan-400 tracking-[0.4em] mt-1 font-bold">NATIONAL TREASURY</p>
                </div>
                <button onclick="closePanel()" class="text-slate-500 hover:text-white transition-colors">✕</button>
            </div>

            <div class="grid grid-cols-2 gap-8 mb-10">
                <div class="space-y-1">
                    <span class="text-[8px] uppercase text-slate-500 font-bold">Total Influence</span>
                    <div id="country-total" class="text-3xl font-black font-mono neon-text">$0</div>
                    <div id="country-citizens" class="text-[9px] text-slate-400 uppercase font-bold">0 Contributors</div>
                </div>
                <div class="border-l border-white/10 pl-8 space-y-2">
                    <span class="text-[8px] uppercase text-cyan-400 font-bold">Add Funds</span>
                    <div class="flex items-center gap-3">
                        <span class="text-2xl font-bold text-white/50">$</span>
                        <input type="number" id="custom-amount" value="5.00" step="1" class="bg-transparent text-3xl font-black outline-none w-full border-b border-cyan-400/20 focus:border-cyan-400 transition-all">
                    </div>
                </div>
            </div>

            <button onclick="initiatePayment()" class="w-full bg-cyan-400 text-black font-black py-5 text-[11px] uppercase tracking-[0.4em] hover:bg-white transition-all shadow-[0_0_20px_rgba(0,242,255,0.3)]">
                Contribute to Glory
            </button>
        </div>

    </div>

    <!-- MODAL AUTH -->
    <div id="auth-modal" class="hidden fixed inset-0 z-[4000] bg-black/95 flex items-center justify-center p-4">
        <div class="w-full max-w-sm glass-panel p-10 ui-element border border-cyan-400/30">
            <h3 class="text-xl font-black text-center mb-8 uppercase italic tracking-widest">Authentication</h3>
            <div class="space-y-5">
                <input type="email" id="auth-email" placeholder="EMAIL ADDRESS" class="w-full bg-white/5 border border-white/10 p-4 text-[10px] outline-none focus:border-cyan-400">
                <input type="password" id="auth-pass" placeholder="ACCESS CIPHER" class="w-full bg-white/5 border border-white/10 p-4 text-[10px] outline-none focus:border-cyan-400">
            </div>
            <button onclick="handleAuth('login')" class="w-full bg-cyan-400 text-black font-black py-4 text-[10px] mt-8 uppercase tracking-widest">Execute</button>
            <button onclick="hideAuthModal()" class="w-full mt-4 text-[8px] text-slate-600 uppercase tracking-widest hover:text-white">Abort</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCGbqxVZBers7XbTUM94A3GM5pkBYYt3_0",
            authDomain: "sealed-2bd55.firebaseapp.com",
            projectId: "sealed-2bd55",
            storageBucket: "sealed-2bd55.firebasestorage.app",
            messagingSenderId: "677524832121",
            appId: "1:677524832121:web:3c8c29084fad7ab3b4b9a8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const stripe = Stripe('pk_test_51TVjwdGsTyjMzFLCrl6ZBH80WEz53136nqOUrXUOYiJV2C0vLsQrkrzOgY1edwVnaH7DAUvemMWFnrFMc9ZRWRr200AfgGOSgy');

        let map = L.map('map', { zoomControl: false, minZoom: 2.3 }).setView([20, 0], 2.5);
        let geoLayer, countriesDB = {}, selectedLayer = null, selectedISO = null;

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        // --- AUTH ---
        auth.onAuthStateChanged(user => {
            document.getElementById('auth-logged-in').classList.toggle('hidden', !user);
            document.getElementById('auth-logged-out').classList.toggle('hidden', !!user);
            if(user) document.getElementById('user-display').innerText = user.email.split('@')[0];
        });

        async function handleAuth(t) {
            const e = document.getElementById('auth-email').value, p = document.getElementById('auth-pass').value;
            try {
                if(t === 'login') await auth.signInWithEmailAndPassword(e,p);
                hideAuthModal();
            } catch(err) { alert("Invalid access credentials."); }
        }

        function toggleSettings() { document.getElementById('settings-menu').classList.toggle('hidden'); }
        function logout() { auth.signOut(); window.location.reload(); }
        function showAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function hideAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }

        // --- MAP & DATA ---
        async function load() {
            const [g, d] = await Promise.all([
                fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson').then(r => r.json()),
                fetch('/api/countries').then(r => r.json())
            ]);
            countriesDB = d;
            
            if(geoLayer) map.removeLayer(geoLayer);
            geoLayer = L.geoJSON(g, {
                style: (f) => {
                    const data = countriesDB[f.properties.iso_a3];
                    const intensity = data ? Math.min(data.total_invested / 500, 1) : 0;
                    return {
                        fillOpacity: data ? 0.3 + (intensity * 0.5) : 0.15,
                        fillColor: data ? '#00f2ff' : '#0a0c10',
                        color: data ? '#00f2ff' : '#1a1d23',
                        weight: 1
                    };
                },
                onEachFeature: (f, layer) => {
                    layer.on('click', (e) => {
                        selectCountry(f.properties.iso_a3, f.properties.name, layer);
                        L.DomEvent.stopPropagation(e);
                    });
                }
            }).addTo(map);
            renderLeaderboard();
        }

        function selectCountry(iso, name, layer = null) {
            if(selectedLayer) geoLayer.resetStyle(selectedLayer);
            selectedISO = iso;
            const data = countriesDB[iso];
            
            if(layer) {
                selectedLayer = layer;
                layer.setStyle({ color: '#fff', weight: 3, fillOpacity: 0.6 });
            }

            document.getElementById('country-name').innerText = name;
            document.getElementById('country-total').innerText = `$${(data?.total_invested || 0).toFixed(2)}`;
            document.getElementById('country-citizens').innerText = `${data?.contributor_count || 0} Contributors`;
            document.getElementById('contribution-panel').classList.add('active');
        }

        function renderLeaderboard() {
            const sorted = Object.entries(countriesDB).sort((a,b) => b[1].total_invested - a[1].total_invested).slice(0, 20);
            document.getElementById('scoreboard').innerHTML = sorted.map(([iso, data]) => `
                <div onclick="clickLeaderboard('${iso}')" class="flex items-center justify-between p-3 border-b border-white/5 hover:bg-cyan-400/5 cursor-pointer group transition-all">
                    <div class="flex items-center gap-3">
                        <img src="https://flagcdn.com/w20/${iso.substring(0,2).toLowerCase()}.png" class="w-4 h-3 object-cover rounded-[1px] opacity-70 group-hover:opacity-100">
                        <span class="font-bold text-[10px] tracking-tighter">${iso}</span>
                    </div>
                    <div class="text-right">
                        <div class="text-cyan-400 font-bold text-[11px]">$${data.total_invested.toFixed(0)}</div>
                        <div class="text-[6px] text-slate-500 uppercase font-black">${data.contributor_count} CITIZENS</div>
                    </div>
                </div>
            `).join('');
        }

        function clickLeaderboard(iso) {
            geoLayer.eachLayer(layer => {
                if(layer.feature.properties.iso_a3 === iso) {
                    selectCountry(iso, layer.feature.properties.name, layer);
                    map.flyTo(layer.getBounds().getCenter(), 4);
                }
            });
        }

        async function initiatePayment() {
            if(!auth.currentUser) return showAuthModal();
            const btn = event.target;
            btn.disabled = true; btn.innerText = "AUTHENTICATING...";
            
            try {
                const res = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        code: selectedISO, 
                        price: document.getElementById('custom-amount').value,
                        user_id: auth.currentUser.uid,
                        username: auth.currentUser.email.split('@')[0]
                    })
                });
                const s = await res.json();
                if(s.id) stripe.redirectToCheckout({ sessionId: s.id });
                else alert(s.error);
            } catch(e) { console.error(e); }
            btn.disabled = false; btn.innerText = "Contribute to Glory";
        }

        function closePanel() { 
            document.getElementById('contribution-panel').classList.remove('active');
            if(selectedLayer) geoLayer.resetStyle(selectedLayer);
            selectedLayer = null;
        }

        map.on('click', () => closePanel());

        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
