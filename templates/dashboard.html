<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DOLLAR MAP</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --bg: #05070a; }
        body, html { margin: 0; height: 100%; background: var(--bg); font-family: 'JetBrains Mono', monospace; color: white; overflow: hidden; }
        
        /* La Map prend tout l'écran en fond */
        #map { position: absolute; inset: 0; background: var(--bg) !important; z-index: 1; }
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(0.15) contrast(1.5); }

        /* Conteneur UI Global : IMPORTANT pour laisser passer les clics sur la map */
        .ui-overlay { position: absolute; inset: 0; z-index: 1000; pointer-events: none; }
        .ui-element { pointer-events: auto; }

        /* Style Logo Version Précédente */
        .logo-container {
            border: 1px solid rgba(0, 242, 255, 0.2);
            background: rgba(13, 17, 23, 0.9);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.1);
        }

        .neon-text { color: var(--neon); text-shadow: 0 0 10px rgba(0, 242, 255, 0.5); }
        .glass-panel { background: rgba(13, 17, 23, 0.95); border: 1px solid rgba(0, 242, 255, 0.1); backdrop-filter: blur(5px); }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }

        .dropdown-menu { display: none; position: absolute; right: 0; top: 110%; width: 200px; }
        .dropdown-menu.show { display: block; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="ui-overlay">
        
        <div class="absolute top-6 left-1/2 -translate-x-1/2 ui-element">
            <div class="logo-container px-8 py-3 flex items-center gap-4">
                <div class="h-8 w-1 bg-cyan-400"></div>
                <h1 class="text-xl font-black italic tracking-tighter uppercase">THE DOLLAR MAP</h1>
            </div>
        </div>

        <div class="absolute top-6 left-6 w-64 ui-element">
            <div class="glass-panel p-4 border-l-2 border-cyan-400 max-h-[80vh] flex flex-col">
                <h2 class="text-[9px] font-bold uppercase tracking-[0.3em] text-cyan-400/60 mb-4 flex justify-between items-center">
                    Ranking <span>LIVE</span>
                </h2>
                <div id="scoreboard" class="space-y-3 overflow-y-auto pr-1">
                    </div>
            </div>
        </div>

        <div class="absolute top-6 right-6 ui-element">
            <div id="auth-logged-out">
                <button onclick="showAuthModal()" class="glass-panel text-[10px] px-6 py-2 uppercase tracking-widest border border-cyan-400/20 hover:bg-cyan-400/10 transition-all">Identify</button>
            </div>
            <div id="auth-logged-in" class="hidden relative">
                <button onclick="toggleSettings()" class="glass-panel px-4 py-2 flex items-center gap-3 border border-cyan-400/20">
                    <span id="user-display" class="text-[10px] font-bold neon-text uppercase tracking-widest">---</span>
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
                </button>
                <div id="settings-menu" class="dropdown-menu glass-panel p-2 border border-cyan-400/20">
                    <button onclick="openChangeUsername()" class="w-full text-left p-2 text-[9px] hover:bg-cyan-400/10 uppercase tracking-widest border-b border-white/5">Change Pseudo</button>
                    <button onclick="logout()" class="w-full text-left p-2 text-[9px] hover:bg-red-500/10 text-red-400 uppercase tracking-widest">Disconnect</button>
                </div>
            </div>
        </div>

        <div id="buy-panel" class="absolute bottom-10 right-10 w-80 glass-panel p-6 translate-x-[120%] transition-all duration-500 ui-element">
            <h2 id="country-name" class="text-xl font-bold uppercase italic mb-4">---</h2>
            <div class="grid grid-cols-2 gap-3 mb-6">
                <div class="p-2 bg-white/5">
                    <p class="text-[7px] text-slate-500 uppercase">Current</p>
                    <div id="country-price" class="text-sm font-bold">$1.00</div>
                </div>
                <div class="p-2 bg-cyan-400/5 border-l border-cyan-400">
                    <p class="text-[7px] text-cyan-400 uppercase">Bid</p>
                    <input type="number" id="custom-price" class="w-full bg-transparent text-sm font-bold outline-none">
                </div>
            </div>
            <button id="pay-button" onclick="initiatePayment()" class="w-full bg-cyan-400 text-black font-black py-3 text-[10px] uppercase tracking-widest hover:shadow-[0_0_15px_#00f2ff]">Confirm conquest</button>
        </div>

    </div>

    <div id="auth-modal" class="hidden fixed inset-0 z-[4000] bg-black/90 flex items-center justify-center p-4">
        <div class="w-full max-w-sm glass-panel p-8 border border-cyan-400/30 ui-element">
            <h3 id="auth-title" class="text-lg font-black uppercase text-center mb-6 italic tracking-tighter">Terminal Access</h3>
            <div class="space-y-4">
                <div id="username-field" class="hidden">
                    <label class="text-[8px] text-cyan-400 uppercase mb-1 block">Username</label>
                    <input type="text" id="auth-user" class="w-full bg-white/5 border border-white/10 p-3 text-xs outline-none focus:border-cyan-400">
                </div>
                <div>
                    <label class="text-[8px] text-cyan-400 uppercase mb-1 block">Email</label>
                    <input type="email" id="auth-email" class="w-full bg-white/5 border border-white/10 p-3 text-xs outline-none focus:border-cyan-400">
                </div>
                <div>
                    <label class="text-[8px] text-cyan-400 uppercase mb-1 block">Password</label>
                    <input type="password" id="auth-pass" class="w-full bg-white/5 border border-white/10 p-3 text-xs outline-none focus:border-cyan-400">
                </div>
            </div>
            <div id="login-actions" class="mt-6 space-y-2">
                <button onclick="handleAuth('login')" class="w-full bg-cyan-400 text-black font-bold py-3 text-[10px] uppercase">Login</button>
                <button onclick="toggleAuthMode(true)" class="w-full text-[8px] text-slate-500 uppercase py-2">No account? Create</button>
            </div>
            <div id="signup-actions" class="hidden mt-6 space-y-2">
                <button onclick="handleAuth('signup')" class="w-full bg-cyan-400 text-black font-bold py-3 text-[10px] uppercase">Create Account</button>
                <button onclick="toggleAuthMode(false)" class="w-full text-[8px] text-slate-500 uppercase py-2">Back to Login</button>
            </div>
            <button onclick="hideAuthModal()" class="w-full mt-4 text-[8px] text-slate-600 uppercase hover:text-white">Close</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCGbqxVZBers7XbTUM94A3GM5pkBYYt3_0",
            authDomain: "sealed-2bd55.firebaseapp.com",
            projectId: "sealed-2bd55",
            storageBucket: "sealed-2bd55.firebasestorage.app",
            messagingSenderId: "677524832121",
            appId: "1:677524832121:web:3c8c29084fad7ab3b4b9a8"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const stripe = Stripe('pk_test_51TVjwdGsTyjMzFLCrl6ZBH80WEz53136nqOUrXUOYiJV2C0vLsQrkrzOgY1edwVnaH7DAUvemMWFnrFMc9ZRWRr200AfgGOSgy');

        let map = L.map('map', { zoomControl: false, minZoom: 2.3 }).setView([20, 0], 2.5);
        let geoLayer, countriesDB = {}, selectedLayer = null, selectedISO = null;

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        // --- AUTH ---
        auth.onAuthStateChanged(user => {
            const outB = document.getElementById('auth-logged-out'), inB = document.getElementById('auth-logged-in');
            if (user) {
                outB.classList.add('hidden'); inB.classList.remove('hidden');
                document.getElementById('user-display').innerText = (user.displayName || user.email.split('@')[0]);
                hideAuthModal();
            } else {
                outB.classList.remove('hidden'); inB.classList.add('hidden');
            }
        });

        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value, pass = document.getElementById('auth-pass').value;
            try {
                if (type === 'signup') {
                    const res = await auth.createUserWithEmailAndPassword(email, pass);
                    await res.user.updateProfile({ displayName: document.getElementById('auth-user').value });
                    window.location.reload();
                } else await auth.signInWithEmailAndPassword(email, pass);
            } catch(e) { alert(e.message); }
        }

        function toggleAuthMode(s) {
            document.getElementById('username-field').classList.toggle('hidden', !s);
            document.getElementById('login-actions').classList.toggle('hidden', s);
            document.getElementById('signup-actions').classList.toggle('hidden', !s);
        }

        function toggleSettings() { document.getElementById('settings-menu').classList.toggle('show'); }
        function logout() { auth.signOut(); }
        function showAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function hideAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }
        async function openChangeUsername() {
            const n = prompt("New username:");
            if(n && auth.currentUser) { await auth.currentUser.updateProfile({displayName: n}); window.location.reload(); }
        }

        // --- MAP & LOGIC ---
        async function load() {
            const [g, d] = await Promise.all([
                fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson').then(r => r.json()),
                fetch('/api/countries').then(r => r.json())
            ]);
            countriesDB = d;
            if(geoLayer) map.removeLayer(geoLayer);
            
            geoLayer = L.geoJSON(g, {
                style: (f) => {
                    const data = countriesDB[f.properties.iso_a3];
                    return {
                        fillOpacity: data ? 0.7 : 0.2,
                        fillColor: data ? '#00f2ff' : '#0a0c10',
                        color: data ? '#00f2ff' : '#1a1d23',
                        weight: 1
                    };
                },
                onEachFeature: (f, layer) => {
                    layer.on('click', (e) => {
                        // Reset précédent
                        if(selectedLayer) geoLayer.resetStyle(selectedLayer);
                        
                        // Nouveau style permanent
                        selectedLayer = layer;
                        layer.setStyle({ color: '#fff', weight: 3, fillOpacity: 0.4 });
                        
                        const iso = f.properties.iso_a3;
                        const data = countriesDB[iso];
                        selectedISO = iso;
                        
                        document.getElementById('country-name').innerText = f.properties.name;
                        document.getElementById('country-price').innerText = data ? `$${data.price.toFixed(2)}` : "FREE";
                        document.getElementById('custom-price').value = data ? (data.price * 1.2).toFixed(2) : "1.00";
                        document.getElementById('buy-panel').style.transform = "translateX(0)";
                        
                        L.DomEvent.stopPropagation(e);
                    });
                }
            }).addTo(map);
            renderLeaderboard();
        }

        function renderLeaderboard() {
            const sorted = Object.entries(countriesDB).sort((a,b) => b[1].price - a[1].price).slice(0, 15);
            document.getElementById('scoreboard').innerHTML = sorted.map(([iso, data]) => {
                const flag = iso.substring(0,2).toLowerCase();
                return `
                    <div class="flex items-center justify-between border-b border-white/5 pb-2">
                        <div class="flex items-center gap-2">
                            <img src="https://flagcdn.com/w20/${flag}.png" onerror="this.style.opacity='0'" class="w-4 h-3 object-cover rounded-sm">
                            <span class="font-bold text-[10px]">${iso}</span>
                        </div>
                        <div class="text-right">
                            <div class="text-cyan-400 font-bold">$${data.price.toFixed(0)}</div>
                            <div class="text-[6px] text-slate-500 uppercase truncate max-w-[60px]">${data.owner_name || 'Legacy'}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        async function initiatePayment() {
            if(!auth.currentUser) return showAuthModal();
            const btn = document.getElementById('pay-button');
            btn.disabled = true; btn.innerText = "Processing...";
            try {
                const res = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        code: selectedISO, 
                        price: document.getElementById('custom-price').value,
                        user_id: auth.currentUser.uid,
                        username: auth.currentUser.displayName || auth.currentUser.email.split('@')[0]
                    })
                });
                const s = await res.json();
                if(s.id) stripe.redirectToCheckout({ sessionId: s.id });
                else alert(s.error);
            } catch(e) { console.error(e); }
            btn.disabled = false; btn.innerText = "Confirm conquest";
        }

        map.on('click', () => {
            if(selectedLayer) geoLayer.resetStyle(selectedLayer);
            selectedLayer = null;
            document.getElementById('buy-panel').style.transform = "translateX(120%)";
            document.getElementById('settings-menu').classList.remove('show');
        });

        load();
        setInterval(load, 30000);
    </script>
</body>
</html>
