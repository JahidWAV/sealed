<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>The Dollar Map - Conquer the World</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #map { height: 70vh; background: #0b0e14; border-radius: 20px; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .leaflet-container { background: #0b0e14 !important; }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

<div class="container mx-auto p-6">
    <header class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold tracking-tighter text-blue-500">THE DOLLAR MAP<span class="text-white">.com</span></h1>
        <div class="bg-slate-800 px-4 py-2 rounded-full border border-slate-700">
            Solde: <span id="user-balance" class="font-bold text-green-400">0.00 €</span>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2">
            <div id="map"></div>
        </div>

        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
            <h2 id="country-name" class="text-2xl font-bold mb-2">Sélectionnez un pays</h2>
            <div id="country-info" class="hidden">
                <p class="text-slate-400 mb-4">Code: <span id="country-code" class="text-white"></span></p>
                <div class="bg-slate-900 p-4 rounded-xl mb-6">
                    <p class="text-sm text-slate-500 uppercase">Prix actuel</p>
                    <p id="country-price" class="text-3xl font-mono font-bold text-blue-400">1.00 €</p>
                </div>
                
                <label class="block text-sm text-slate-400 mb-2">URL de votre image (Logo/Photo)</label>
                <input type="text" id="image-url" placeholder="https://..." class="w-full bg-slate-700 border-none rounded-lg p-3 mb-4 focus:ring-2 focus:ring-blue-500">
                
                <button onclick="processPurchase()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-4 rounded-xl transition-all">
                    CONQUÉRIR CE PAYS
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([20, 0], 2);
    let selectedISO = null;
    let countryLayers = {};

    // Fond de carte sombre
    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

    // Fonction pour créer un motif d'image dans le SVG de la carte
    function updatePattern(id, url) {
        let defs = document.querySelector('svg defs') || document.createElementNS("http://www.w3.org/2000/svg", "defs");
        if (!defs.parentNode) document.querySelector('svg').appendChild(defs);
        
        let pattern = document.getElementById('pat-'+id);
        if(!pattern) {
            pattern = document.createElementNS("http://www.w3.org/2000/svg", "pattern");
            pattern.setAttribute('id', 'pat-'+id);
            pattern.setAttribute('patternUnits', 'userSpaceOnUse');
            pattern.setAttribute('width', '100');
            pattern.setAttribute('height', '100');
            const img = document.createElementNS("http://www.w3.org/2000/svg", "image");
            img.setAttribute('width', '100');
            img.setAttribute('height', '100');
            pattern.appendChild(img);
            defs.appendChild(pattern);
        }
        pattern.querySelector('image').setAttribute('href', url);
    }

    // Charger les frontières et les données Firestore
    Promise.all([
        fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson').then(r => r.json()),
        fetch('/api/countries').then(r => r.json())
    ]).then(([geoData, dbData]) => {
        L.geoJSON(geoData, {
            style: (f) => {
                const iso = f.properties.iso_a3;
                if(dbData[iso] && dbData[iso].image_url) {
                    updatePattern(iso, dbData[iso].image_url);
                    return { fillOpacity: 0.7, fillColor: `url(#pat-${iso})`, color: '#334155', weight: 1 };
                }
                return { fillOpacity: 0.2, fillColor: '#1e293b', color: '#334155', weight: 1 };
            },
            onEachFeature: (f, layer) => {
                layer.on('click', () => {
                    selectedISO = f.properties.iso_a3;
                    document.getElementById('country-name').innerText = f.properties.name;
                    document.getElementById('country-code').innerText = selectedISO;
                    document.getElementById('country-info').classList.remove('hidden');
                    const data = dbData[selectedISO] || {price: 1.0};
                    document.getElementById('country-price').innerText = data.price.toFixed(2) + " €";
                });
            }
        }).addTo(map);
    });

    async function processPurchase() {
        const url = document.getElementById('image-url').value;
        if(!url) return alert("Mettez une URL d'image !");
        
        const res = await fetch('/buy-country', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({code: selectedISO, image_url: url})
        });
        const result = await res.json();
        if(result.success) {
            alert("Pays conquis !");
            location.reload();
        } else {
            alert(result.error);
        }
    }
</script>
</body>
</html>
