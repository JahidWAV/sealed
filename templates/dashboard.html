<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Dashboard Wallet</title>
</head>
<body class="bg-gray-900 text-white p-6">
    <div class="max-w-4xl mx-auto">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-2xl font-bold">Mon Portefeuille Numérique</h1>
            <a href="/logout" class="text-red-400">Déconnexion</a>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Carte Solde -->
            <div class="bg-gradient-to-br from-blue-600 to-purple-700 p-8 rounded-3xl shadow-xl">
                <p class="text-blue-100 mb-2">Solde Total</p>
                <h2 class="text-5xl font-black mb-6">{{ user.balance }} €</h2>
                <p class="text-xs opacity-70">Adresse : {{ user.wallet_address }}</p>
            </div>

            <!-- Actions -->
            <div class="bg-gray-800 p-8 rounded-3xl shadow-xl">
                <h3 class="text-xl font-bold mb-4">Actions rapides</h3>
                <button class="w-full bg-green-500 py-3 rounded-xl mb-4 font-bold">Envoyer de l'argent</button>
                <button class="w-full bg-gray-700 py-3 rounded-xl font-bold">Historique</button>
            </div>
        </div>
    </div>
</body>
</html>
