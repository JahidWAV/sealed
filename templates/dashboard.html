<!-- Dans la section Actions de ton dashboard.html -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 mt-10">
    
    <!-- FORMULAIRE D'ENVOI REEL -->
    <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700">
        <h3 class="text-xl font-bold mb-6 flex items-center gap-2">
            <span class="text-blue-500">●</span> Envoyer des fonds
        </h3>
        <form action="/send" method="POST" class="space-y-4">
            <div>
                <label class="text-xs text-gray-500 uppercase font-bold px-1">Adresse du destinataire</label>
                <input type="text" name="recipient_address" placeholder="0x..." class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl focus:border-blue-500 outline-none transition" required>
            </div>
            <div>
                <label class="text-xs text-gray-500 uppercase font-bold px-1">Montant (€)</label>
                <input type="number" step="0.01" name="amount" placeholder="0.00" class="w-full bg-gray-900 border border-gray-700 p-3 rounded-xl focus:border-blue-500 outline-none transition" required>
            </div>
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-3 rounded-xl font-black transition transform active:scale-95 shadow-lg">
                CONFIRMER LE TRANSFERT
            </button>
        </form>
    </div>

    <!-- HISTORIQUE DES TRANSACTIONS -->
    <div class="bg-gray-800 p-6 rounded-2xl border border-gray-700">
        <h3 class="text-xl font-bold mb-6">Derniers mouvements</h3>
        <div class="space-y-4 max-h-[300px] overflow-y-auto pr-2">
            {% if transactions %}
                {% for tx in transactions %}
                <div class="flex justify-between items-center p-3 bg-gray-900/50 rounded-xl border border-gray-700">
                    <div>
                        <p class="text-xs text-gray-500">{{ tx.timestamp.strftime('%d/%m/%Y %H:%M') }}</p>
                        <p class="text-sm font-mono text-gray-300">Vers: {{ tx.recipient_address[:10] }}...</p>
                    </div>
                    <span class="text-red-400 font-bold">- {{ "%.2f"|format(tx.amount) }} €</span>
                </div>
                {% endfor %}
            {% else %}
                <p class="text-gray-600 text-center py-10">Aucune transaction effectuée.</p>
            {% endif %}
        </div>
    </div>
</div>
