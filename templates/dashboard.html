<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE DOLLAR MAP | Global Command</title>
    
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://js.stripe.com/v3/"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

    <style>
        :root { --neon: #00f2ff; --neon-muted: rgba(0, 242, 255, 0.2); --bg: #05070a; }
        
        body, html { 
            margin: 0; height: 100%; background: var(--bg); 
            font-family: 'JetBrains Mono', monospace; color: white; overflow: hidden; 
        }

        #map { position: absolute; inset: 0; background: var(--bg) !important; z-index: 1; }

        /* Effet de scanline sur toute la map */
        #map::after {
            content: ""; position: absolute; inset: 0; 
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            background-size: 100% 4px, 3px 100%; pointer-events: none; z-index: 2;
        }

        .ui-panel { 
            background: rgba(10, 12, 16, 0.95); 
            border: 1px solid var(--neon-muted);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        .neon-text { color: var(--neon); text-shadow: 0 0 8px rgba(0, 242, 255, 0.5); }
        
        .btn-primary {
            background: var(--neon); color: black; font-weight: 800;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0 100%);
        }

        .btn-primary:hover:not(:disabled) {
            box-shadow: 0 0 20px var(--neon);
            transform: scale(1.02);
        }

        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Leaflet Overrides */
        .leaflet-tile-pane { filter: invert(100%) hue-rotate(180deg) brightness(0.1) contrast(1.8); }
        .country-path { transition: 0.2s; outline: none; }
        .leaflet-container { background: var(--bg) !important; }
        
        /* Scrollbar */
        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-thumb { background: var(--neon); }
    </style>
</head>
<body>

    <div id="map"></div>

    <nav class="absolute top-0 left-0 right-0 z-[1000] p-6 flex justify-between items-center">
        <div class="flex items-center gap-4">
            <div class="w-2 h-8 bg-cyan-400 shadow-[0_0_10px_#00f2ff]"></div>
            <div>
                <h1 class="text-xl font-black tracking-tighter uppercase italic">The Dollar Map</h1>
                <p class="text-[8px] text-cyan-400/50 tracking-[0.4em] uppercase">Global Asset Dominance</p>
            </div>
        </div>
        
        <div id="auth-controls" class="flex items-center gap-4">
            <div id="auth-logged-out">
                <button onclick="showAuthModal()" class="text-[10px] border border-cyan-400/30 px-6 py-2 hover:bg-cyan-400/10 transition-all uppercase tracking-widest">
                    Identify Session
                </button>
            </div>
            <div id="auth-logged-in" class="hidden flex items-center gap-6">
                <div class="text-right">
                    <span class="block text-[8px] text-slate-500 uppercase">Commander</span>
                    <span id="user-display" class="text-xs font-bold neon-text">---</span>
                </div>
                <button onclick="logout()" class="p-2 hover:text-red-500 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <aside class="absolute top-28 left-8 z-[1000] w-64 h-[65vh] flex flex-col">
        <div class="ui-panel p-5 rounded-sm flex-1 overflow-hidden flex flex-col">
            <div class="flex items-center justify-between mb-6 border-b border-cyan-400/20 pb-2">
                <h2 class="text-[10px] font-bold uppercase tracking-widest text-cyan-400">Market Top</h2>
                <span class="w-2 h-2 rounded-full bg-red-500 animate-pulse"></span>
            </div>
            <div id="scoreboard" class="space-y-4 overflow-y-auto pr-2">
                </div>
        </div>
    </aside>

    <div id="buy-panel" class="absolute bottom-10 left-1/2 -translate-x-1/2 z-[1000] w-[450px] ui-panel p-8 translate-y-64 opacity-0 transition-all duration-500 rounded-sm">
        <div class="flex justify-between items-start mb-6">
            <div>
                <span class="text-[9px] text-cyan-400 uppercase tracking-[0.3em]">Sector Target</span>
                <h2 id="country-name" class="text-3xl font-black uppercase italic tracking-tighter">Country</h2>
            </div>
            <button onclick="closePanel()" class="opacity-30 hover:opacity-100 transition-opacity">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-white/5 p-4 border-l-2 border-white/10">
                <p class="text-[8px] text-slate-500 uppercase mb-1">Current Val.</p>
                <div id="country-price" class="text-xl font-bold font-mono">$1.00</div>
            </div>
            <div class="bg-cyan-400/5 p-4 border-l-2 border-cyan-400">
                <p class="text-[8px] text-cyan-400 uppercase mb-1">Acquisition Bid</p>
                <div class="flex items-center">
                    <span class="text-cyan-400 font-bold mr-1">$</span>
                    <input type="number" id="custom-price" class="w-full bg-transparent text-xl font-bold outline-none font-mono" step="0.01">
                </div>
            </div>
        </div>

        <button id="pay-button" onclick="initiatePayment()" class="w-full btn-primary py-5 text-[10px] tracking-[0.4em] uppercase">
            Initialize Transaction
        </button>
        <p class="text-[7px] text-center mt-4 text-slate-500 tracking-widest">SECURE ENCRYPTED STRIPE LINK</p>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 z-[2000] bg-black/90 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="w-full max-w-sm ui-panel p-10 border-cyan-400/40">
            <div class="text-center mb-8">
                <h3 class="text-xl font-black uppercase italic tracking-tighter mb-2 text-cyan-400">Identity Terminal</h3>
                <p class="text-[8px] text-slate-500 uppercase tracking-widest">Access required for global transactions</p>
            </div>
            <div class="space-y-4">
                <div class="space-y-1">
                    <label class="text-[8px] uppercase text-cyan-400/50 ml-1">Email Hash</label>
                    <input type="email" id="auth-email" class="w-full bg-white/5 border border-white/10 p-4 text-xs outline-none focus:border-cyan-400 transition-all">
                </div>
                <div class="space-y-1">
                    <label class="text-[8px] uppercase text-cyan-400/50 ml-1">Access Cipher</label>
                    <input type="password" id="auth-pass" class="w-full bg-white/5 border border-white/10 p-4 text-xs outline-none focus:border-cyan-400 transition-all">
                </div>
            </div>
            <div class="grid grid-cols-2 gap-3 mt-8">
                <button onclick="handleAuth('login')" class="btn-primary py-3 text-[10px]">LOGIN</button>
                <button onclick="handleAuth('register')" class="border border-cyan-400/50 text-cyan-400 py-3 text-[10px] hover:bg-cyan-400/10 transition-all">SIGN UP</button>
            </div>
            <button onclick="hideAuthModal()" class="w-full mt-6 text-[8px] text-slate-600 uppercase tracking-widest hover:text-white transition-colors">Abort Terminal</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // --- CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCGbqxVZBers7XbTUM94A3GM5pkBYYt3_0",
            authDomain: "sealed-2bd55.firebaseapp.com",
            projectId: "sealed-2bd55",
            storageBucket: "sealed-2bd55.firebasestorage.app",
            messagingSenderId: "677524832121",
            appId: "1:677524832121:web:3c8c29084fad7ab3b4b9a8",
            measurementId: "G-P5ZB6CFK9H"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const stripe = Stripe('pk_test_51TVjwdGsTyjMzFLCrl6ZBH80WEz53136nqOUrXUOYiJV2C0vLsQrkrzOgY1edwVnaH7DAUvemMWFnrFMc9ZRWRr200AfgGOSgy');

        const map = L.map('map', { zoomControl: false, minZoom: 2.3 }).setView([20, 0], 2.5);
        let countriesDB = {};
        let currentUser = null;
        let selectedISO = null;
        let geoLayer;

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map);

        // --- AUTH LOGIC ---
        auth.onAuthStateChanged(user => {
            const outBox = document.getElementById('auth-logged-out');
            const inBox = document.getElementById('auth-logged-in');
            if (user) {
                currentUser = user;
                outBox.classList.add('hidden');
                inBox.classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                hideAuthModal();
            } else {
                currentUser = null;
                outBox.classList.remove('hidden');
                inBox.classList.add('hidden');
            }
        });

        async function handleAuth(type) {
            const email = document.getElementById('auth-email').value;
            const pass = document.getElementById('auth-pass').value;
            if(!email || !pass) return alert("INPUT ERROR: BLANK FIELDS");
            try {
                if(type === 'login') await auth.signInWithEmailAndPassword(email, pass);
                else await auth.createUserWithEmailAndPassword(email, pass);
            } catch(e) { alert("TERMINAL REJECTED: " + e.message); }
        }

        function showAuthModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function hideAuthModal() { document.getElementById('auth-modal').classList.add('hidden'); }
        function logout() { auth.signOut(); }

        // --- DATA ENGINE ---
        async function load() {
            try {
                const [g, d] = await Promise.all([
                    fetch('https://raw.githubusercontent.com/datasets/geo-boundaries-world-110m/master/countries.geojson').then(r => r.json()),
                    fetch('/api/countries').then(r => r.json())
                ]);
                countriesDB = d;
                
                if(geoLayer) map.removeLayer(geoLayer);

                geoLayer = L.geoJSON(g, {
                    style: (f) => {
                        const iso = f.properties.iso_a3;
                        const conquered = countriesDB[iso];
                        return {
                            fillOpacity: 1,
                            fillColor: conquered ? '#00f2ff' : '#0a0c10',
                            color: conquered ? '#00f2ff' : '#1a1d23',
                            weight: conquered ? 1 : 0.5,
                            className: 'country-path'
                        };
                    },
                    onEachFeature: (f, layer) => {
                        layer.on({
                            mouseover: (e) => { 
                                e.target.setStyle({ weight: 2, color: '#00f2ff' });
                                if(!countriesDB[f.properties.iso_a3]) e.target.setStyle({ fillColor: '#1a1d23' });
                            },
                            mouseout: (e) => { geoLayer.resetStyle(e.target); },
                            click: (e) => {
                                selectedISO = f.properties.iso_a3;
                                const data = countriesDB[selectedISO];
                                document.getElementById('country-name').innerText = f.properties.name;
                                let min = data ? (data.price * 1.2).toFixed(2) : "1.00";
                                document.getElementById('country-price').innerText = data ? `$${data.price.toFixed(2)}` : "UNCLAIMED";
                                document.getElementById('custom-price').value = min;
                                
                                const panel = document.getElementById('buy-panel');
                                panel.classList.remove('translate-y-64', 'opacity-0');
                                L.DomEvent.stopPropagation(e);
                            }
                        });
                    }
                }).addTo(map);
                renderLeaderboard();
            } catch(e) { console.error("FATAL LOAD ERROR", e); }
        }

        function renderLeaderboard() {
            const list = Object.entries(countriesDB).sort((a,b) => b[1].price - a[1].price).slice(0, 10);
            document.getElementById('scoreboard').innerHTML = list.map(([iso, data], i) => `
                <div class="group relative bg-white/5 p-3 border-l border-white/10 hover:border-cyan-400 transition-all">
                    <div class="flex justify-between items-start mb-1">
                        <span class="text-[8px] text-cyan-400/50 font-bold">#0${i+1}</span>
                        <span class="text-[10px] font-mono text-cyan-400 font-bold">$${data.price.toFixed(0)}</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-bold tracking-tighter">${iso}</span>
                        <span class="text-[7px] text-slate-500 truncate max-w-[80px]">${data.owner_name || 'LEGACY'}</span>
                    </div>
                </div>
            `).join('') || '<p class="text-[8px] text-center opacity-30 mt-10 tracking-[0.3em]">AWAITING DATA...</p>';
        }

        async function initiatePayment() {
            if(!currentUser) return showAuthModal();
            const btn = document.getElementById('pay-button');
            const price = document.getElementById('custom-price').value;
            
            btn.innerText = "OPENING SECURE PORTAL..."; btn.disabled = true;

            try {
                const res = await fetch('/create-checkout-session', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        code: selectedISO, 
                        price: price,
                        user_id: currentUser.uid,
                        username: currentUser.email.split('@')[0]
                    })
                });
                const session = await res.json();
                if(session.id) stripe.redirectToCheckout({ sessionId: session.id });
                else alert("STRIPE REJECTED: " + session.error);
            } catch(e) { alert("NETWORK TIMEOUT"); }
            finally { btn.innerText = "Initialize Transaction"; btn.disabled = false; }
        }

        function closePanel() { 
            const panel = document.getElementById('buy-panel');
            panel.classList.add('translate-y-64', 'opacity-0'); 
        }
        
        map.on('click', closePanel);
        load();
        // Auto-refresh leaderboard every 30s
        setInterval(load, 30000);
    </script>
</body>
</html>
