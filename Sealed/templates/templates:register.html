<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Créer mon Portefeuille</title>
</head>
<body class="bg-gray-900 text-white flex items-center justify-center h-screen">
    <div class="bg-gray-800 p-10 rounded-2xl shadow-2xl w-96">
        <h1 class="text-3xl font-bold mb-6 text-center text-blue-400">Inscription</h1>
        <form method="POST">
            <input type="text" name="username" placeholder="Nom d'utilisateur" class="w-full p-3 mb-4 rounded bg-gray-700 border-none focus:ring-2 focus:ring-blue-500" required>
            <input type="password" name="password" placeholder="Mot de passe" class="w-full p-3 mb-6 rounded bg-gray-700 border-none focus:ring-2 focus:ring-blue-500" required>
            <button type="submit" class="w-full bg-blue-600 py-3 rounded-lg font-bold hover:bg-blue-700 transition">Créer mon Wallet</button>
        </form>
        <p class="mt-4 text-center text-gray-400 text-sm">Déjà un compte ? <a href="/login" class="text-blue-400">Connexion</a></p>
    </div>
</body>
</html>
